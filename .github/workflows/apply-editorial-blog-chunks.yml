name: Apply Editorial Blog Chunked Patch

on:
  push:
    branches:
      - codex/editorial-blog-apply-aab3f2f

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[editorial-blog-ready]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/editorial-blog-apply-aab3f2f
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild patch from chunks
        run: |
          cat .github/patch-parts/part-* | tr -d '\n\r ' > /tmp/editorial-blog.patch.b64
          echo "66a47ad531a1a7e11f73f11c53fb6dd53031769ed3043eb818f7d814a4ea6b01  /tmp/editorial-blog.patch.b64" | sha256sum -c -
          base64 -d /tmp/editorial-blog.patch.b64 | gzip -d > /tmp/editorial-blog.patch
          test -s /tmp/editorial-blog.patch

      - name: Apply local commit patch
        run: |
          git config user.name "codex-app"
          git config user.email "codex-app@users.noreply.github.com"
          git am /tmp/editorial-blog.patch

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Build Jekyll
        run: |
          bundle install
          bundle exec jekyll build

      - name: Remove temporary publisher files
        run: |
          rm -rf _site .bundle vendor/bundle Gemfile.lock .github/patch-parts .github/workflows/apply-editorial-blog-chunks.yml
          git add -A
          git commit -m "Remove publicador temporário [editorial-blog-ready]"
          git push origin HEAD:codex/editorial-blog-apply-aab3f2f
