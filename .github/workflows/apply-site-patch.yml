name: Aplicar e validar reestruturação editorial

on:
  push:
    branches:
      - codex/reestrutura-editorias-metodo

permissions:
  contents: write

jobs:
  apply-build-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "data2comms automation"
          git config user.email "actions@users.noreply.github.com"

      - name: Aplicar commit do site
        run: |
          test "$(sha256sum .github/site.patch.b64 | cut -d' ' -f1)" = "2f50d36c3571f491856def02d5904c20cbf5fbf7ab57c1aaeab661fd70d268b1"
          base64 --decode .github/site.patch.b64 | gzip -dc > /tmp/data2comms.patch
          git am /tmp/data2comms.patch

      - name: Configurar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Instalar dependências
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Validar build Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Remover arquivos temporários e publicar branch
        run: |
          rm -rf _site vendor .github/site.patch.b64 .github/workflows/apply-site-patch.yml
          git add -A
          git commit -m "Remove publicador temporário [site-ready]"
          git push origin HEAD:codex/reestrutura-editorias-metodo
