  Uma página sobre pacotes deve explicar formatos, para quem serve, entregáveis, limites, prazo, rotina, indicadores e diferença entre projetos. O objetivo não é esconder tudo para forçar reunião. É educar o comprador para que a conversa comercial seja mais qualificada.

