<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | data2comms</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ink: '#0A0A0A', paper: '#F2F0EB', electricBlue: '#2A5BFF', concrete: '#A6A6A6' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'], mono: ['IBM Plex Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F2F0EB; color: #0A0A0A; -webkit-font-smoothing: antialiased; }
        ::selection { background-color: #D6FF00; color: #0A0A0A; }
        .border-editorial { border-color: #0A0A0A; }
        .border-b-editorial { border-bottom: 1px solid #0A0A0A; }
        .hover-invert:hover { background-color: #0A0A0A; color: #F2F0EB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C3ZTDYFHLT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-C3ZTDYFHLT');
</script>
</head>
<body class="font-sans overflow-x-hidden flex flex-col min-h-screen">

    {% include header.html %}

    <main class="flex-grow">
        <div class="w-full h-[40vh] md:h-[50vh] lg:h-[60vh] bg-concrete relative overflow-hidden border-b-editorial">
            {% if page.image %}
            <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-full object-cover">
            {% endif %}
        </div>

        <article class="max-w-4xl mx-auto px-6 py-12 md:py-20">
            <header class="mb-12 md:mb-16 border-b border-ink/20 pb-12">
                <p class="font-mono text-[10px] md:text-[11px] uppercase tracking-widest text-concrete mb-6">
                    {{ page.category }} // {{ page.date | date: "%d %b %Y" }}
                </p>
                <h1 class="font-display text-4xl md:text-5xl lg:text-6xl uppercase tracking-tighter leading-[0.9] mb-8 text-ink">
                    {{ page.title }}
                </h1>
                <p class="font-sans text-xl md:text-2xl leading-relaxed text-ink/80">
                    {{ page.summary }}
                </p>
            </header>

            <div class="prose prose-lg md:prose-xl max-w-none text-ink prose-p:font-sans prose-p:leading-relaxed prose-headings:font-display prose-headings:uppercase prose-headings:tracking-tighter prose-headings:text-ink prose-a:text-electricBlue prose-a:underline hover:prose-a:text-ink prose-blockquote:border-l-4 prose-blockquote:border-ink prose-blockquote:pl-6 prose-blockquote:font-display prose-blockquote:text-2xl prose-blockquote:uppercase prose-blockquote:not-italic prose-blockquote:text-ink prose-strong:font-semibold prose-table:border-collapse prose-table:w-full prose-th:border prose-th:border-ink prose-th:p-3 prose-th:bg-ink prose-th:text-paper prose-td:border prose-td:border-ink prose-td:p-3">
                {{ content }}
            </div>
        </article>
    </main>

    {% include footer.html %}
</body>
</html>
