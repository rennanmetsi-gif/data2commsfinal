<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | data2comms</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Script do Tailwind + Plugin de Tipografia para formatar o seu Markdown automaticamente -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ink: '#0A0A0A', paper: '#F2F0EB', electricBlue: '#2A5BFF', signalPink: '#FF3CA7', acidLime: '#D6FF00', signalRed: '#FF2D20', concrete: '#A6A6A6', },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'], mono: ['IBM Plex Mono', 'monospace'], }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F2F0EB; color: #0A0A0A; -webkit-font-smoothing: antialiased; }
        ::selection { background-color: #D6FF00; color: #0A0A0A; }
        .border-editorial { border-color: #0A0A0A; }
        .border-b-editorial { border-bottom: 1px solid #0A0A0A; }
        .reveal-up { opacity: 0; transform: translateY(40px); transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .reveal-up.is-visible { opacity: 1; transform: translateY(0); }
        .reveal-wipe { clip-path: inset(0 100% 0 0); transition: clip-path 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .reveal-wipe.is-visible { clip-path: inset(0 0 0 0); }
    </style>
</head>
<body class="font-sans overflow-x-hidden flex flex-col min-h-screen">

    <!-- Puxa o seu cabeçalho mágico -->
    {% include header.html %}

    <main class="flex-grow">
        <!-- CAPA DA PUBLICAÇÃO (Corrigida com a abertura da cortina) -->
        <div class="w-full h-[40vh] md:h-[50vh] lg:h-[60vh] bg-concrete relative overflow-hidden border-b-editorial">
            <div class="reveal-wipe absolute inset-0 w-full h-full">
                {% if page.image %}
                <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-full object-cover">
                {% endif %}
            </div>
        </div>

        <!-- CABEÇALHO DO TEXTO -->
        <article class="max-w-4xl mx-auto px-6 py-12 md:py-20">
            <header class="reveal-up mb-12 md:mb-16 border-b border-ink/20 pb-12">
                <p class="font-mono text-[10px] md:text-[11px] uppercase tracking-widest text-concrete mb-6">
                    {{ page.category }} // {{ page.date | date: "%d %b %Y" }}
                </p>
                <h1 class="font-display text-4xl md:text-5xl lg:text-6xl uppercase tracking-tighter leading-[0.9] mb-8 text-ink">
                    {{ page.title }}
                </h1>
                <p class="font-sans text-xl md:text-2xl leading-relaxed text-ink/80">
                    {{ page.summary }}
                </p>
            </header>

            <!-- CORPO DO TEXTO: Aqui a mágica do Markdown ganha vida com a tag 'content' -->
            <div class="reveal-up prose prose-lg md:prose-xl max-w-none prose-p:font-sans prose-p:leading-relaxed prose-p:text-ink/90 prose-headings:font-display prose-headings:uppercase prose-headings:tracking-tighter prose-headings:text-ink prose-a:text-electricBlue prose-a:underline hover:prose-a:text-ink prose-blockquote:border-l-4 prose-blockquote:border-ink prose-blockquote:pl-6 prose-blockquote:font-display prose-blockquote:text-2xl prose-blockquote:uppercase prose-blockquote:not-italic prose-blockquote:text-ink prose-strong:font-semibold prose-table:border-collapse prose-table:w-full prose-th:border prose-th:border-ink prose-th:p-3 prose-th:bg-ink prose-th:text-paper prose-td:border prose-td:border-ink prose-td:p-3">
                {{ content }}
            </div>
        </article>
    </main>

    <!-- Puxa o seu rodapé mágico -->
    {% include footer.html %}

    <!-- Script de ativação (Para abrir a imagem cinza e revelar os textos) -->
    <script>
        let scrollObserver;
        function setupScrollAnimations() {
            const options = { root: null, rootMargin: '0px', threshold: 0.1 };
            scrollObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) { entry.target.classList.add('is-visible'); }
                });
            }, options);
            document.querySelectorAll('.reveal-up, .reveal-wipe').forEach(el => scrollObserver.observe(el));
        }
        
        document.addEventListener('DOMContentLoaded', () => { 
            setupScrollAnimations(); 
        });
    </script>
</body>
</html>
